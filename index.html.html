<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sílaba Game Ultra - PIP ROCÍO REYES</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --success: #00e676;
            --panel: #fff9c4; 
            --danger: #ff0000; 
        }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            margin: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden; color: #333;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1));
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: -1;
        }

        .bubble-up { bottom: -100px; animation: riseAndBounce 5s infinite ease-in-out; }
        .bubble-down { top: -100px; animation: fallAndBounce 5s infinite ease-in-out; }

        @keyframes riseAndBounce {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { transform: translateY(-45vh) scale(1.2); opacity: 0.8; }
            100% { transform: translateY(0) scale(1); opacity: 0; }
        }

        @keyframes fallAndBounce {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { transform: translateY(45vh) scale(1.2); opacity: 0.8; }
            100% { transform: translateY(0) scale(1); opacity: 0; }
        }

        #music-btn {
            position: fixed; top: 15px; right: 15px;
            background: rgba(255,255,255,0.4); border: 2px solid #fff;
            color: #000; border-radius: 50%; width: 55px; height: 55px;
            cursor: pointer; font-size: 25px; z-index: 100;
        }

        #star-counter {
            position: fixed; top: 15px; left: 15px;
            background: #000;
            padding: 15px 25px; border-radius: 25px;
            font-weight: bold; font-size: 1.4rem; color: #ffd600;
            display: flex; align-items: center; gap: 10px; z-index: 100;
            border: 2px solid #ffd600;
        }

        #mascot {
            position: absolute; bottom: 20px; right: 20px;
            font-size: 95px; animation: idleMascot 2s infinite ease-in-out;
        }

        @keyframes idleMascot {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        #pizarra {
            background: var(--panel);
            border: 10px solid #fbc02d;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            width: 95%; max-width: 780px;
            padding: 40px; border-radius: 60px;
            text-align: center; position: relative;
        }

        .instruccion {
            font-size: 1.9rem; color: #d32f2f; font-weight: bold;
            margin-bottom: 20px;
        }

        /* TÍTULO CON MOVIMIENTO Y CAMBIO DE COLOR */
        .title-start {
            background: linear-gradient(135deg, #fbc02d, #f9a825);
            border: 5px solid white; padding: 35px 60px; border-radius: 30px;
            color: white; font-size: 3.2rem; font-weight: 900;
            cursor: pointer; 
            animation: pulse 1.5s infinite, swing 3s infinite ease-in-out;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transition: background 0.3s;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        @keyframes pulse { 0%, 100% { scale: 1; } 50% { scale: 1.05; } }

        .emoji-main { font-size: 170px; margin: 10px 0; display: block; filter: drop-shadow(0 0 10px rgba(0,0,0,0.1)); }
        .word-main { font-size: 4.8rem; font-weight: 900; letter-spacing: 6px; margin-bottom: 25px; color: #1a237e; }
        .syllable-display { color: #d32f2f; text-shadow: 0 0 2px rgba(0,0,0,0.1); }

        .circles-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .circle {
            width: 85px; height: 85px;
            border: 6px solid #f9a825; border-radius: 50%;
            cursor: pointer; transition: 0.2s;
            background: white;
        }
        .circle.active { 
            background: #00d2ff; 
            box-shadow: 0 0 25px #00d2ff; 
            transform: scale(1.15); 
            border-color: white;
        }

        .controls { display: flex; justify-content: center; gap: 25px; align-items: center; }

        .btn-verificar {
            background: var(--success); color: white; border: 4px solid white;
            padding: 20px 60px; font-size: 2.2rem; border-radius: 60px;
            cursor: pointer; font-weight: bold; box-shadow: 0 8px 0 #009624;
        }

        .btn-atras {
            background: var(--danger); color: white; border: 4px solid white;
            padding: 20px 40px; font-size: 2.2rem; border-radius: 60px;
            cursor: pointer; font-weight: bold; box-shadow: 0 8px 0 #b30000;
        }

        .btn-atras:active, .btn-verificar:active { transform: translateY(4px); box-shadow: none; }

        #game-content { display: none; }
        .shake { animation: shakeEffect 0.5s; }
        @keyframes shakeEffect {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-20px); }
            75% { transform: translateX(20px); }
        }

        /* ESTILO PARA EL CONFETI */
        .confetti {
            position: absolute; width: 15px; height: 15px;
            z-index: 1000; pointer-events: none;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <button id="music-btn" onclick="toggleMusic()">🎵</button>
    <div id="star-counter">🌟 Estrellas: <span id="star-count">0</span> / 40</div>
    <div id="mascot">🤖</div>

    <div id="pizarra">
        <div id="start-screen">
            <button id="main-title" class="title-start" onclick="begin(); changeTitleColor()">CONTAR SÍLABAS</button>
            <p style="margin-top: 40px; font-size: 1.6rem; font-weight: bold;">I.E. N° 162 San José Obrero</p>
            <p style="opacity: 0.8; font-size: 1.3rem;">PIP: ROCÍO REYES</p>
        </div>

        <div id="game-content">
            <div class="instruccion">Colorea los círculos según las sílabas</div>
            <span class="emoji-main" id="emoji"></span>
            <div class="word-main" id="word"></div>
            <div class="circles-row" id="circles"></div>
            
            <div class="controls">
                <button class="btn-atras" onclick="atras()">ATRÁS</button>
                <button class="btn-verificar" onclick="validarRespuesta()">VERIFICAR</button>
            </div>
            
            <p style="margin-top: 30px; font-weight: bold; font-size: 1.2rem; color: #1a237e;">PIP: ROCÍO REYES</p>
        </div>
    </div>

    <script>
        const data = [
            { e: "🐴", w: "Caballo", s: 3, syl: "Ca - ba - llo" }, { e: "⭐", w: "Estrella", s: 3, syl: "Es - tre - lla" },
            { e: "🥁", w: "Tambor", s: 2, syl: "Tam - bor" }, { e: "🌳", w: "Árbol", s: 2, syl: "Ár - bol" },
            { e: "🐦", w: "Pájaro", s: 3, syl: "Pá - ja - ro" }, { e: "🏠", w: "Casa", s: 2, syl: "Ca - sa" },
            { e: "☀️", w: "Sol", s: 1, syl: "Sol" }, { e: "🐘", w: "Elefante", s: 4, syl: "E - le - fan - te" },
            { e: "🍎", w: "Manzana", s: 3, syl: "Man - za - na" }, { e: "🚀", w: "Cohete", s: 3, syl: "Co - he - te" },
            { e: "🐱", w: "Gato", s: 2, syl: "Ga - to" }, { e: "🐶", w: "Perro", s: 2, syl: "Pe - rro" },
            { e: "🎈", w: "Globo", s: 2, syl: "Glo - bo" }, { e: "✏️", w: "Lápiz", s: 2, syl: "Lá - piz" },
            { e: "🌙", w: "Luna", s: 2, syl: "Lu - na" }, { e: "🚗", w: "Coche", s: 2, syl: "Co - che" },
            { e: "🦁", w: "León", s: 2, syl: "Le - ón" }, { e: "🐵", w: "Mono", s: 2, syl: "Mo - no" },
            { e: "🦒", w: "Jirafa", s: 3, syl: "Ji - ra - fa" }, { e: "🦋", w: "Mariposa", s: 4, syl: "Ma - ri - po - sa" },
            { e: "🌸", w: "Flor", s: 1, syl: "Flor" }, { e: "🍕", w: "Pizza", s: 2, syl: "Piz - za" },
            { e: "🍋", w: "Limón", s: 2, syl: "Li - món" }, { e: "🍌", w: "Plátano", s: 3, syl: "Plá - ta - no" },
            { e: "🍇", w: "Uva", s: 2, syl: "U - va" }, { e: "🍍", w: "Piña", s: 2, syl: "Pi - ña" },
            { e: "🚲", w: "Bici", s: 2, syl: "Bi - ci" }, { e: "🧸", w: "Oso", s: 2, syl: "O - so" },
            { e: "🚢", w: "Barco", s: 2, syl: "Bar - co" }, { e: "✈️", w: "Avión", s: 2, syl: "A - vión" },
            { e: "🐟", w: "Pez", s: 1, syl: "Pez" }, { e: "🐸", w: "Rana", s: 2, syl: "Ra - na" },
            { e: "🐢", w: "Tortuga", s: 3, syl: "Tor - tu - ga" }, { e: "🦉", w: "Búho", s: 2, syl: "Bú - ho" },
            { e: "🦊", w: "Zorro", s: 2, syl: "Zo - rro" }, { e: "🌽", w: "Choclo", s: 2, syl: "Choc - lo" },
            { e: "🍞", w: "Pan", s: 1, syl: "Pan" }, { e: "🥕", w: "Zanahoria", s: 5, syl: "Za - na - ho - ria" },
            { e: "🍅", w: "Tomate", s: 3, syl: "To - ma - te" }, { e: "🧃", w: "Jugo", s: 2, syl: "Ju - go" }
        ];

        let idx = 0, locked = false, musicOn = false, seleccion = 0, stars = 0;
        let audioCtx, gain;

        function createBubbles() {
            for(let i=0; i<25; i++){
                let b = document.createElement('div');
                let isUp = Math.random() > 0.5;
                b.className = isUp ? 'bubble bubble-up' : 'bubble bubble-down';
                let s = Math.random()*60 + 25 + "px";
                b.style.width = s; b.style.height = s;
                b.style.left = Math.random()*100 + "vw";
                b.style.animationDelay = Math.random()*5 + "s";
                document.body.appendChild(b);
            }
        }
        createBubbles();

        function changeTitleColor() {
            const colors = ['#f44336', '#9c27b0', '#2196f3', '#4caf50', '#ffeb3b', '#ff9800'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('main-title').style.background = randomColor;
        }

        function toggleMusic() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (!musicOn) { musicOn = true; document.getElementById('music-btn').innerText = "🔊"; playTune(); }
            else { musicOn = false; document.getElementById('music-btn').innerText = "🎵"; if(gain) gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); }
        }

        function playTune() {
            if (!musicOn) return;
            const chords = [261.63, 329.63, 392.00, 440.00];
            let n = 0;
            const step = () => {
                if (!musicOn) return;
                let osc = audioCtx.createOscillator(); gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(chords[n % chords.length], audioCtx.currentTime);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 0.5);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
                n++; setTimeout(step, 1400);
            }; step();
        }

        function speak(t, cb) {
            const u = new SpeechSynthesisUtterance(t); u.lang = 'es-PE'; u.rate = 0.9;
            if(cb) u.onend = cb; window.speechSynthesis.speak(u);
        }

        function begin() {
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-content').style.display = 'block';
                speak("Colorea los círculos según la cantidad de sílabas", load);
            }, 300);
        }

        function load() {
            if (idx >= data.length) { finish(); return; }
            const item = data[idx]; locked = false; seleccion = 0;
            document.getElementById('emoji').innerText = item.e;
            document.getElementById('word').innerText = item.w.toUpperCase();
            document.getElementById('mascot').innerText = "🤖";
            const box = document.getElementById('circles'); box.innerHTML = '';
            for(let i = 1; i <= 5; i++) {
                const c = document.createElement('div'); c.className = 'circle';
                c.onclick = () => { if(!locked) pintar(i); }; box.appendChild(c);
            }
            speak(item.w);
        }

        function pintar(n) {
            seleccion = n;
            const circles = document.querySelectorAll('.circle');
            circles.forEach((c, i) => c.classList.toggle('active', i < n));
        }

        function atras() {
            if(locked || seleccion === 0) return;
            seleccion--;
            const circles = document.querySelectorAll('.circle');
            circles.forEach((c, i) => c.classList.toggle('active', i < seleccion));
        }

        function popConfetti() {
            for(let i=0; i<60; i++){
                const p = document.createElement('div'); p.className = 'confetti';
                p.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
                p.style.left = "50%"; p.style.top = "50%";
                const x = (Math.random()*600 - 300) + "px"; 
                const y = (Math.random()*600 - 400) + "px";
                const a = p.animate([
                    { transform: 'translate(-50%, -50%) rotate(0deg) scale(0)', opacity: 1 }, 
                    { transform: `translate(${x}, ${y}) rotate(${Math.random()*720}deg) scale(1.5)`, opacity: 0 }
                ], { duration: 2000, easing: 'cubic-bezier(0, .9, .57, 1)' });
                document.body.appendChild(p); 
                a.onfinish = () => p.remove();
            }
        }

        function validarRespuesta() {
            if(locked || seleccion === 0) return;
            locked = true;
            if(seleccion === data[idx].s) {
                const item = data[idx];
                document.getElementById('word').innerHTML = `<span class="syllable-display">${item.syl}</span>`;
                speak("¡Excelente!");
                document.getElementById('mascot').innerText = "🎉🤖";
                popConfetti(); 
                updateStars();
                setTimeout(() => { idx++; load(); }, 2000);
            } else {
                document.getElementById('pizarra').classList.add('shake');
                speak("Error"); 
                document.getElementById('mascot').innerText = "🤔🤖";
                setTimeout(() => { document.getElementById('pizarra').classList.remove('shake'); locked = false; }, 1000);
            }
        }

        function updateStars() {
            stars++; document.getElementById('star-count').innerText = stars;
            if(stars % 10 === 0) { setTimeout(()=> speak("¡Muy bien! Llevas diez estrellas."), 1200); }
        }

        function finish() {
            document.getElementById('game-content').innerHTML = `
                <h1 style="font-size: 3.5rem; color: #d32f2f;">¡LO LOGRASTE! 🏆</h1>
                <p style="font-size: 1.8rem;">Terminaste los 40 retos.</p>
                <p style="font-size: 1.5rem; font-weight: bold;">I.E. N° 162 San José Obrero</p>
                <p style="font-size: 1.5rem; color: #1a237e;"><b>PIP: ROCÍO REYES</b></p>
                <button class="title-start" onclick="location.reload()" style="margin-top: 20px;">REPETIR</button>
            `;
        }
    </script>
</body>
</html>
